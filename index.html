<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CampusTrace AI - Choice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="text-align: center;">
        <header>
            <h1>🔍 CampusTrace <span>AI</span></h1>
            <p>Select an option to continue</p>
        </header>

        <div class="main-card" style="display: flex; flex-direction: column; gap: 20px;">
            <div onclick="window.location.href='lost.html'" style="cursor:pointer; background: rgba(255, 71, 87, 0.1); padding: 30px; border-radius: 15px; border: 1px solid #ff4757;">
                <h2 style="color: #ff4757;">😟 I Lost Something</h2>
                <p style="font-size: 13px;">Check found items or post a report.</p>
            </div>

            <div onclick="window.location.href='found.html'" style="cursor:pointer; background: rgba(46, 213, 115, 0.1); padding: 30px; border-radius: 15px; border: 1px solid #2ed573;">
                <h2 style="color: #2ed573;">😊 I Found Something</h2>
                <p style="font-size: 13px;">Report an item to help its owner.</p>
            </div>
        </div>
    </div>
</body>
</html>
